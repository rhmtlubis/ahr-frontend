      name="keywords"
      content="jersey custom, jersey sublimasi, seragam printing, konveksi jersey, apparel olahraga, jersey futsal, jersey sepak bola, AHR"
    />

    <link rel="canonical" href="https://ahrcorporation.id/" />

    <meta property="og:site_name" content="AHR" />
    <meta property="og:locale" content="id_ID" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AHR | Jersey Custom Sublimasi, Seragam Printing & Konveksi" />
    <meta
      property="og:description"
      content="AHR melayani jersey custom sublimasi, seragam printing, apparel olahraga, dan kebutuhan konveksi custom untuk tim, komunitas, sekolah, dan perusahaan."
    />
    <meta property="og:url" content="https://ahrcorporation.id/" />
    <meta property="og:image" content="https://ahrcorporation.id/og-preview.png" />
    <meta property="og:image:alt" content="AHR custom jersey and sublimation apparel" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AHR | Jersey Custom Sublimasi, Seragam Printing & Konveksi" />
    <meta
      name="twitter:description"
      content="AHR melayani jersey custom sublimasi, seragam printing, apparel olahraga, dan kebutuhan konveksi custom untuk tim, komunitas, sekolah, dan perusahaan."
    />
    <meta name="twitter:image" content="https://ahrcorporation.id/og-preview.png" />
    <title>AHR | Jersey Custom Sublimasi, Seragam Printing & Konveksi</title>
  </head>
  <body>
    <script>
      (() => {
        const isMobile = window.matchMedia('(max-width: 767px)').matches
        const link = document.createElement('link')

        if (isMobile) {
          link.rel = 'preload'
          link.as = 'video'
          link.href = '/videos/ahr-hero-mobile.mp4'
          link.type = 'video/mp4'
        } else {
          link.rel = 'preload'
          link.as = 'image'
          link.href = '/og-preview.png'
          link.fetchPriority = 'high'

          const img = document.createElement('img')
          img.src = '/og-preview.png'
          img.alt = ''
          img.width = 1200
          img.height = 630
          img.decoding = 'async'
          img.ariaHidden = 'true'
          img.fetchPriority = 'high'
          img.style.cssText =
            'position:absolute;width:0;height:0;opacity:0;pointer-events:none'
          document.body.appendChild(img)
        }

        document.head.appendChild(link)
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
